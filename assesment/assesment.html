<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Marks Management</title>
  <link rel="stylesheet" href="assesment.css">
</head>
<body>
  <h2>Student Marks Management System</h2>

  <label>Student Name:</label>
  <input type="text" id="name"><br>
  
  <label>Roll Number:</label>
  <input type="text" id="roll"><br>
  
  <label>Math Marks:</label>
  <input type="number" id="math"><br>
  
  <label>Science Marks:</label>
  <input type="number" id="science"><br>
  
  <label>English Marks:</label>
  <input type="number" id="english"><br>
  
  <button onclick="addStudent()">Add Student</button>
  <button onclick="displayStudents()">Display All Students</button>
  <button onclick="calculateTotals()">Calculate Totals</button>
  <button onclick="calculateAverages()">Calculate Averages</button>
  <button onclick="displayAbove80()">Students Above 80 Avg</button>
  <button onclick="displayFailed()">Failed Students</button>
  <button onclick="countStudents()">Count Students</button>

  <div id="output"></div>

  <script src="assesment.js"></script>
</body>
</html>
